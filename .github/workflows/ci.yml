name: Validate Release Wrapper

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wrapper-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tooling:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout wrapper
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run release tooling tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Compile release tooling
        shell: bash
        run: python -m py_compile scripts/*.py

      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -no-color

name: Build and Release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "私有源码分支 / Tag / Commit"
        required: true
        default: "main"
        type: string
      publish_release:
        description: "是否创建 GitHub Release"
        required: true
        default: true
        type: boolean
      platform_windows_x64:
        description: "编译 Windows x64 桌面版"
        required: false
        default: true
        type: boolean
      platform_windows_arm64:
        description: "编译 Windows arm64 桌面版（队列可能较慢）"
        required: false
        default: false
        type: boolean
      platform_linux_x64:
        description: "编译 Linux x64 桌面版 (WebKitGTK 4.0, 适用于 Ubuntu 22.04 / Debian 12 等旧系统)"
        required: false
        default: true
        type: boolean
      platform_linux_x64_gtk41:
        description: "编译 Linux x64 桌面版 (WebKitGTK 4.1, 适用于 Ubuntu 24.04 / Fedora 40+ / Debian 13+ 等新系统)"
        required: false
        default: true
        type: boolean
      platform_linux_arm64:
        description: "编译 Linux arm64 桌面版 (WebKitGTK 4.1)"
        required: false
        default: true
        type: boolean
      platform_macos_arm64:
        description: "编译 macOS arm64 桌面版"
        required: false
        default: true
        type: boolean
      platform_macos_x64:
        description: "编译 macOS Intel x64 桌面版"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: POf-L/Fanqie-novel-Downloader-actions/.github/workflows/reusable-build-desktop.yml@main
    with:
      source_ref: ${{ inputs.source_ref }}
      publish_release: ${{ inputs.publish_release }}
      platform_windows_x64: ${{ inputs.platform_windows_x64 }}
      platform_windows_arm64: ${{ inputs.platform_windows_arm64 }}
      platform_linux_x64: ${{ inputs.platform_linux_x64 }}
      platform_linux_x64_gtk41: ${{ inputs.platform_linux_x64_gtk41 }}
      platform_linux_arm64: ${{ inputs.platform_linux_arm64 }}
      platform_macos_arm64: ${{ inputs.platform_macos_arm64 }}
      platform_macos_x64: ${{ inputs.platform_macos_x64 }}
    secrets:
      PRIVATE_SOURCE_TOKEN: ${{ secrets.PRIVATE_SOURCE_TOKEN }}

name: Build and Release Tauri

# 公开仓库只负责调度、打包和发布；核心源码在运行时从私有 Tauri
# 仓库只读检出，不会提交到本仓库。
on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "私有 Tauri 源码分支 / Tag / Commit"
        required: true
        default: "main"
        type: string
      publish_release:
        description: "创建 GitHub Release"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "标记为预发布（预发布不会被稳定版自动更新检测到）"
        required: true
        default: false
        type: boolean
      platform_windows_x64:
        description: "Windows x64"
        required: false
        default: true
        type: boolean
      platform_windows_arm64:
        description: "Windows ARM64"
        required: false
        default: true
        type: boolean
      platform_linux_x64:
        description: "Linux x64"
        required: false
        default: true
        type: boolean
      platform_linux_arm64:
        description: "Linux ARM64"
        required: false
        default: true
        type: boolean
      platform_macos_x64:
        description: "macOS Intel"
        required: false
        default: true
        type: boolean
      platform_macos_arm64:
        description: "macOS Apple Silicon"
        required: false
        default: true
        type: boolean
      platform_android:
        description: "Android 通用 APK + AAB"
        required: false
        default: true
        type: boolean
      platform_ios:
        description: "iOS IPA（无签名，需自行侧载安装）"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PRIVATE_SOURCE_REPOSITORY: "POf-L/Fanqie-novel-Downloader-tauri"
  PRIVATE_SOURCE_PATH: "private-src"
  TAURI_CLI_VERSION: "2.11.4"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_NDK_VERSION: "27.2.12479018"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      desktop_matrix: ${{ steps.platforms.outputs.desktop_matrix }}
      desktop_fallback_matrix: ${{ steps.platforms.outputs.desktop_fallback_matrix }}
      desktop_count: ${{ steps.platforms.outputs.desktop_count }}
      desktop_fallback_count: ${{ steps.platforms.outputs.desktop_fallback_count }}
      android_enabled: ${{ steps.platforms.outputs.android_enabled }}
      ios_enabled: ${{ steps.platforms.outputs.ios_enabled }}
      selected_platforms: ${{ steps.platforms.outputs.selected_platforms }}
      source_commit: ${{ steps.meta.outputs.source_commit }}
      source_ref: ${{ steps.meta.outputs.source_ref }}
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      updater_signing: ${{ steps.secrets.outputs.updater_signing }}
      android_signing: ${{ steps.secrets.outputs.android_signing }}
      ios_signing: ${{ steps.secrets.outputs.ios_signing }}
    steps:
      - name: Validate private source token
        env:
          PRIVATE_SOURCE_TOKEN: ${{ secrets.PRIVATE_SOURCE_TOKEN }}
        run: |
          if [[ -z "${PRIVATE_SOURCE_TOKEN}" ]]; then
            echo "Missing repository secret: PRIVATE_SOURCE_TOKEN"
            exit 1
          fi

      - name: Checkout private Tauri source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.PRIVATE_SOURCE_TOKEN }}
          path: ${{ env.PRIVATE_SOURCE_PATH }}
          fetch-depth: 1

      - name: Select build platforms
        id: platforms
        shell: python
        env:
          WINDOWS_X64: ${{ inputs.platform_windows_x64 }}
          WINDOWS_ARM64: ${{ inputs.platform_windows_arm64 }}
          LINUX_X64: ${{ inputs.platform_linux_x64 }}
          LINUX_ARM64: ${{ inputs.platform_linux_arm64 }}
          MACOS_X64: ${{ inputs.platform_macos_x64 }}
          MACOS_ARM64: ${{ inputs.platform_macos_arm64 }}
          ANDROID: ${{ inputs.platform_android }}
          IOS: ${{ inputs.platform_ios }}
        run: |
          import json
          import os

          def enabled(name: str) -> bool:
              return os.environ.get(name, "").strip().lower() in {
                  "1", "true", "yes", "on"
              }

          # allow_fallback: scarce runners may OOM / queue-fail; a second job
          # cross-compiles on a more available runner when release assets are missing.
          candidates = [
              ("WINDOWS_X64", {
                  "os": "windows-latest",
                  "platform": "windows-x64",
                  "target": "x86_64-pc-windows-msvc",
                  "bundles": "nsis",
                  "allow_fallback": False,
                  "asset_substr": "windows-x64",
              }),
              ("WINDOWS_ARM64", {
                  "os": "windows-11-arm",
                  "platform": "windows-arm64",
                  "target": "aarch64-pc-windows-msvc",
                  "bundles": "nsis",
                  "allow_fallback": True,
                  "fallback_os": "windows-latest",
                  "fallback_bundles": "nsis",
                  "asset_substr": "windows-arm64",
              }),
              ("LINUX_X64", {
                  "os": "ubuntu-22.04",
                  "platform": "linux-x64",
                  "target": "x86_64-unknown-linux-gnu",
                  "bundles": "deb,appimage",
                  "allow_fallback": False,
                  "asset_substr": "linux-amd64",
              }),
              ("LINUX_ARM64", {
                  "os": "ubuntu-24.04-arm",
                  "platform": "linux-arm64",
                  "target": "aarch64-unknown-linux-gnu",
                  "bundles": "deb,appimage",
                  # Cross AppImage is impractical; fallback only builds .deb.
                  "allow_fallback": True,
                  "fallback_os": "ubuntu-22.04",
                  "fallback_bundles": "deb",
                  "asset_substr": "linux-arm64",
              }),
              ("MACOS_X64", {
                  "os": "macos-15-intel",
                  "platform": "macos-x64",
                  "target": "x86_64-apple-darwin",
                  "bundles": "app,dmg",
                  "allow_fallback": True,
                  "fallback_os": "macos-latest",
                  "fallback_bundles": "app,dmg",
                  "asset_substr": "darwin-x64",
              }),
              ("MACOS_ARM64", {
                  "os": "macos-latest",
                  "platform": "macos-arm64",
                  "target": "aarch64-apple-darwin",
                  "bundles": "app,dmg",
                  "allow_fallback": False,
                  "asset_substr": "darwin-aarch64",
              }),
          ]
          desktop = [entry for name, entry in candidates if enabled(name)]
          fallback = [
              {
                  "os": entry["fallback_os"],
                  "platform": entry["platform"],
                  "target": entry["target"],
                  "bundles": entry["fallback_bundles"],
                  "asset_substr": entry["asset_substr"],
                  "native_os": entry["os"],
              }
              for entry in desktop
              if entry.get("allow_fallback")
          ]
          android = enabled("ANDROID")
          ios = enabled("IOS")
          selected = [entry["platform"] for entry in desktop]
          if android:
              selected.append("android")
          if ios:
              selected.append("ios")
          if not selected:
              raise SystemExit("请至少选择一个目标平台")

          outputs = {
              "desktop_matrix": json.dumps(
                  {"include": desktop}, separators=(",", ":")
              ),
              "desktop_fallback_matrix": json.dumps(
                  {"include": fallback}, separators=(",", ":")
              ),
              "desktop_count": str(len(desktop)),
              "desktop_fallback_count": str(len(fallback)),
              "android_enabled": str(android).lower(),
              "ios_enabled": str(ios).lower(),
              "selected_platforms": ", ".join(selected),
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key, value in outputs.items():
                  output.write(f"{key}={value}\n")

      - name: Generate release metadata
        id: meta
        shell: python
        env:
          SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          import os
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          source = Path(os.environ["PRIVATE_SOURCE_PATH"])
          source_commit = subprocess.check_output(
              ["git", "-C", str(source), "rev-parse", "--short=12", "HEAD"],
              text=True,
          ).strip()
          now = datetime.now(timezone.utc)
          # Tauri 强制 SemVer（最多 3 段、禁止前导零），所以用
          #   YYYY.M.D-HM  → 如 2025.7.7-837
          # 3 段保证 SemVer 合法，-HM 作为 pre-release 后缀保留时间精度。
          # version_parts() 逐段提取数字，解析为 [2025, 7, 7, 837]，
          # 与老版 Go 的 [2025, 6, 7, 27] 比较逻辑完全一致。
          # 不用 strftime("%-m") 因为该格式化符在 Windows 上不支持。
          hm = now.hour * 100 + now.minute
          version = f"{now.year}.{now.month}.{now.day}-{hm}"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"source_commit={source_commit}\n")
              output.write(f"source_ref={os.environ['SOURCE_REF']}\n")
              output.write(f"version={version}\n")
              output.write(f"tag_name=v{version}\n")

      - name: Validate optional signing secrets
        id: secrets
        shell: bash
        env:
          PUBLISH_RELEASE: ${{ inputs.publish_release }}
          ANDROID_ENABLED: ${{ steps.platforms.outputs.android_enabled }}
          IOS_ENABLED: ${{ steps.platforms.outputs.ios_enabled }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: |
          updater=false
          android=false
          ios=false
          if [[ -n "${TAURI_SIGNING_PRIVATE_KEY}" &&
                -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" ]]; then
            updater=true
          fi
          if [[ -n "${ANDROID_KEYSTORE_BASE64}" &&
                -n "${ANDROID_KEY_ALIAS}" &&
                -n "${ANDROID_KEYSTORE_PASSWORD}" &&
                -n "${ANDROID_KEY_PASSWORD}" ]]; then
            android=true
          fi
          if [[ -n "${IOS_CERTIFICATE}" &&
                -n "${IOS_CERTIFICATE_PASSWORD}" &&
                -n "${IOS_MOBILE_PROVISION}" &&
                -n "${APPLE_DEVELOPMENT_TEAM}" ]]; then
            ios=true
          fi

          echo "updater_signing=${updater}" >> "${GITHUB_OUTPUT}"
          echo "android_signing=${android}" >> "${GITHUB_OUTPUT}"
          echo "ios_signing=${ios}" >> "${GITHUB_OUTPUT}"

          if [[ "${PUBLISH_RELEASE}" == "true" && "${updater}" != "true" &&
                "${{ steps.platforms.outputs.desktop_count }}" != "0" ]]; then
            echo "Desktop publishing requires TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD."
            exit 1
          fi
          if [[ "${PUBLISH_RELEASE}" == "true" &&
                "${ANDROID_ENABLED}" == "true" && "${android}" != "true" ]]; then
            echo "Android publishing requires all four Android signing secrets."
            exit 1
          fi
          # iOS unsigned IPA is allowed without Apple signing secrets.
          # Users sideload it themselves (AltStore / Sideloadly / TrollStore).

  verify:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout private Tauri source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.source_ref }}
          token: ${{ secrets.PRIVATE_SOURCE_TOKEN }}
          path: ${{ env.PRIVATE_SOURCE_PATH }}
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.PRIVATE_SOURCE_PATH }}/src-tauri -> target

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Test and lint Tauri source
        working-directory: ${{ env.PRIVATE_SOURCE_PATH }}
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
          cargo test --manifest-path src-tauri/Cargo.toml
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
          node --test tests/*.js
          node --check web/static/app.js
          git diff --check

  release-bootstrap:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        if: inputs.publish_release == true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SOURCE_REF: ${{ needs.prepare.outputs.source_ref }}
          SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
          PLATFORMS: ${{ needs.prepare.outputs.selected_platforms }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          # Draft notes use Chinese + real hyperlinks.
          # Until this build finishes uploading assets, links default to the latest
          # already-published release; finalize will rewrite them to this tag.
          python - <<'PY'
          import json
          import os
          import subprocess
          import urllib.request
          from pathlib import Path

          token = os.environ["GH_TOKEN"]
          repo = os.environ["GH_REPO"]
          version = os.environ["VERSION"]
          tag = os.environ["TAG_NAME"]
          prerelease = os.environ.get("PRERELEASE", "false").lower() == "true"
          source_ref = os.environ.get("SOURCE_REF", "")
          source_commit = os.environ.get("SOURCE_COMMIT", "")
          platforms = os.environ.get("PLATFORMS", "")

          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/releases?per_page=30",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "fanqie-release-bootstrap",
              },
          )
          with urllib.request.urlopen(req) as resp:
              releases = json.load(resp)

          latest = None
          for rel in releases:
              if rel.get("draft"):
                  continue
              assets = [a.get("name", "") for a in (rel.get("assets") or [])]
              useful = [
                  n for n in assets
                  if n and not n.endswith(".sig")
                  and n not in {
                      "latest.json", "SHA256SUMS-release.txt",
                      "SHA256SUMS-android.txt", "SHA256SUMS-ios.txt", "SIGNING.txt",
                  }
              ]
              if useful:
                  latest = rel
                  break

          def pick(names, *needles):
              out = []
              for name in names:
                  low = name.lower()
                  if all(n.lower() in low for n in needles):
                      out.append(name)
              return out

          def link(base, name, label):
              return f"[{label}]({base}/{name})"

          lines = [
              f"## {version}{'（测试预发布）' if prerelease else ''}",
              "",
              "基于 **Rust + Tauri v2** 的番茄小说下载器。",
              "",
              "> ⏳ **本版本正在构建中**。",
              ">",
              "> 📱 **当前支持**：Windows / Linux / macOS / Android；iOS 提供无签名 IPA（需自行侧载）。",
              "",
          ]

          if latest:
              ltag = latest.get("tag_name") or ""
              lname = latest.get("name") or ltag
              base = f"https://github.com/{repo}/releases/download/{ltag}"
              assets = [
                  a.get("name", "")
                  for a in (latest.get("assets") or [])
                  if a.get("name")
                  and not a["name"].endswith(".sig")
                  and a["name"] not in {
                      "latest.json", "SHA256SUMS-release.txt",
                      "SHA256SUMS-android.txt", "SHA256SUMS-ios.txt", "SIGNING.txt",
                  }
              ]
              win_x64 = pick(assets, "windows-x64", ".exe")
              win_arm = pick(assets, "windows-arm64", ".exe")
              mac_arm = [n for n in pick(assets, "darwin-aarch64") if n.endswith(".dmg")]
              mac_x64 = [n for n in pick(assets, "darwin-x64") if n.endswith(".dmg")]
              deb_x64 = pick(assets, "linux-amd64", ".deb")
              deb_arm = pick(assets, "linux-arm64", ".deb")
              app_x64 = pick(assets, "linux-amd64", ".appimage") or pick(assets, "linux-amd64", ".AppImage")
              # case-insensitive already via lower in pick for needles; AppImage may be mixed case
              app_x64 = [n for n in assets if "linux-amd64" in n.lower() and n.lower().endswith(".appimage")]
              app_arm = [n for n in assets if ("linux-arm64" in n.lower() or "linux-aarch64" in n.lower()) and n.lower().endswith(".appimage")]
              apk_arm64 = [n for n in assets if "arm64-v8a" in n.lower() and n.endswith(".apk")]
              apk_uni = [n for n in assets if "universal" in n.lower() and n.endswith(".apk")]
              if not apk_uni:
                  apk_uni = [n for n in assets if n.endswith(".apk") and "arm64-v8a" not in n.lower() and "armeabi" not in n.lower()]
              aab = [n for n in assets if n.endswith(".aab")]

              lines += [
                  f"> 🔗 下方下载链接**暂时指向最新已发布版本** [`{lname}`](https://github.com/{repo}/releases/tag/{ltag})。",
                  "> 本版本构建完成后，链接会自动替换为本版本资源。",
                  "",
                  "## 下载地址（默认：最新已发布版本）",
                  "",
                  "### 🪟 Windows",
                  "",
                  "#### 安装包（推荐）",
                  "",
              ]
              win_parts = []
              if win_x64:
                  win_parts.append(link(base, win_x64[0], "64位（常用）"))
              if win_arm:
                  win_parts.append(link(base, win_arm[0], "ARM64（Surface / 骁龙本）"))
              lines.append("- " + (" | ".join(win_parts) if win_parts else "_暂无_"))
              lines += ["", "### 🍎 macOS", ""]
              mac_parts = []
              if mac_arm:
                  mac_parts.append(link(base, mac_arm[0], "Apple M 芯片（推荐）"))
              if mac_x64:
                  mac_parts.append(link(base, mac_x64[0], "Intel 芯片"))
              lines.append("- " + (" | ".join(mac_parts) if mac_parts else "_暂无_"))
              lines += ["", "### 🐧 Linux", "", "#### DEB 包（推荐）", ""]
              deb_parts = []
              if deb_x64:
                  deb_parts.append(link(base, deb_x64[0], "64位"))
              if deb_arm:
                  deb_parts.append(link(base, deb_arm[0], "ARM64"))
              lines.append("- " + (" | ".join(deb_parts) if deb_parts else "_暂无_"))
              lines += ["", "#### AppImage", ""]
              app_parts = []
              if app_x64:
                  app_parts.append(link(base, app_x64[0], "64位"))
              if app_arm:
                  app_parts.append(link(base, app_arm[0], "ARM64"))
              lines.append("- " + (" | ".join(app_parts) if app_parts else "_暂无_"))
              lines += ["", "### 🤖 Android", "", "#### 手机安装包", ""]
              if apk_arm64:
                  lines.append(f"- {link(base, apk_arm64[0], '64位 arm64-v8a（推荐）')}")
              if apk_uni:
                  lines.append(f"- {link(base, apk_uni[0], '通用版 universal')}")
              if not apk_arm64 and not apk_uni:
                  lines.append("- _暂无_")
              lines += ["", "#### 应用商店包", ""]
              if aab:
                  lines.append(f"- {link(base, aab[0], 'AAB（上架用）')}")
              else:
                  lines.append("- _暂无_")
          else:
              lines += [
                  "> 当前仓库还没有可指向的已发布资源，请稍后再看本页 Assets。",
                  "",
                  "## 下载地址",
                  "",
                  "_构建完成后自动生成各平台下载链接。_",
              ]

          lines += [
              "",
              "### 📱 iOS",
              "",
              "构建完成后会提供 **无签名 IPA**，需自行用 AltStore / Sideloadly / TrollStore 等工具侧载安装。",
              "",
              "---",
              "",
              "### 💎 支持与推广",
              "",
              "如果这个项目对你有帮助，也欢迎支持一下合作服务：",
              "",
              "> 走邀请码注册即送 **1 美元**，不走邀请链接是没有的。麻烦各位体验一下了。",
              "",
              "- [注册链接（含邀请码）](https://999554.xyz/register?aff=Xf2p)",
              "",
              "### 🔗 相关链接",
              "",
              f"- [全部 Releases](https://github.com/{repo}/releases)",
              f"- [问题反馈](https://github.com/{repo}/issues)",
              f"- [项目说明](https://github.com/{repo})",
              "",
              "<details>",
              "<summary>📦 构建信息</summary>",
              "",
              f"- 正在构建版本：`{version}`",
              f"- Tag：`{tag}`",
              f"- 源码引用：`{source_ref}`",
              f"- 源码提交：`{source_commit}`",
              f"- 计划平台：{platforms}",
              "",
              "</details>",
              "",
          ]
          Path("release-notes.md").write_text("\n".join(lines), encoding="utf-8")
          print("Draft notes ready; default download links target latest published release.")
          PY

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release already exists: ${TAG_NAME}"
            gh release edit "${TAG_NAME}" --notes-file release-notes.md || true
          elif [[ "${PRERELEASE}" == "true" ]]; then
            gh release create "${TAG_NAME}" \
              --title "番茄小说下载器 ${VERSION}" \
              --notes-file release-notes.md \
              --target "${GITHUB_SHA}" \
              --draft \
              --prerelease
          else
            gh release create "${TAG_NAME}" \
              --title "番茄小说下载器 ${VERSION}" \
              --notes-file release-notes.md \
              --target "${GITHUB_SHA}" \
              --draft
          fi

  desktop:
    needs: [prepare, verify, release-bootstrap]
    if: needs.prepare.outputs.desktop_count != '0'
    strategy:
      fail-fast: false
      # tauri-action 会逐步合并并上传 latest.json；串行可避免矩阵竞争覆盖。
      max-parallel: 1
      matrix: ${{ fromJSON(needs.prepare.outputs.desktop_matrix) }}
    runs-on: ${{ matrix.os }}
    # Scarce ARM/Intel runners may fail; continue so desktop-fallback can cross-build.
    continue-on-error: ${{ matrix.allow_fallback == true }}
    timeout-minutes: 90
    name: Desktop ${{ matrix.platform }}
    steps:
      - name: Checkout private Tauri source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.source_ref }}
          token: ${{ secrets.PRIVATE_SOURCE_TOKEN }}
          path: ${{ env.PRIVATE_SOURCE_PATH }}
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.PRIVATE_SOURCE_PATH }}/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Create release build config
        shell: python
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
          CREATE_UPDATER_ARTIFACTS: ${{ needs.prepare.outputs.updater_signing }}
        run: |
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["PRIVATE_SOURCE_PATH"]) / "src-tauri" / "tauri.release.conf.json"
          path.write_text(
              json.dumps({
                  "version": os.environ["APP_VERSION"],
                  "bundle": {
                      "createUpdaterArtifacts":
                          os.environ["CREATE_UPDATER_ARTIFACTS"] == "true"
                  },
              }, ensure_ascii=False),
              encoding="utf-8",
          )

      - name: Build, sign updater artifacts and upload
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ${{ env.PRIVATE_SOURCE_PATH }}
          args: >-
            --target ${{ matrix.target }}
            --bundles ${{ matrix.bundles }}
            --config src-tauri/tauri.release.conf.json
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: FanqieNovelDownloader-tauri-[platform]-[arch]-[bundle]
          releaseAssetNamePattern: FanqieNovelDownloader-tauri-[platform]-[arch][setup][ext]
          tagName: ${{ inputs.publish_release && needs.prepare.outputs.tag_name || '' }}
          releaseName: 番茄小说下载器 ${{ needs.prepare.outputs.version }}
          releaseBody: Rust + Tauri v2 全平台正式构建。
          releaseDraft: true
          prerelease: ${{ inputs.prerelease }}

  # When scarce native runners fail (resource pressure / OOM / unavailable),
  # cross-compile the same targets on more available x64/arm64 runners.
  desktop-fallback:
    needs: [prepare, verify, release-bootstrap, desktop]
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.verify.result == 'success' &&
      needs.release-bootstrap.result == 'success' &&
      needs.prepare.outputs.desktop_fallback_count != '0' &&
      needs.desktop.result != 'cancelled'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.prepare.outputs.desktop_fallback_matrix) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    name: Desktop fallback ${{ matrix.platform }} (cross on ${{ matrix.os }})
    steps:
      - name: Check whether native build already uploaded assets
        id: need
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          ASSET_SUBSTR: ${{ matrix.asset_substr }}
          PUBLISH_RELEASE: ${{ inputs.publish_release }}
        run: |
          set -euo pipefail
          if [[ "${PUBLISH_RELEASE}" != "true" ]]; then
            # Without a release, always attempt fallback if this job ran
            # (native may have failed without artifacts).
            echo "run=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if ! gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "run=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          assets="$(gh release view "${TAG_NAME}" --json assets -q '.assets[].name' || true)"
          if printf '%s\n' "${assets}" | grep -F "${ASSET_SUBSTR}" >/dev/null 2>&1; then
            echo "Native (or prior) assets already present for ${ASSET_SUBSTR}; skip cross fallback."
            echo "run=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Missing release assets matching ${ASSET_SUBSTR}; starting cross fallback."
            echo "run=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout private Tauri source
        if: steps.need.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.source_ref }}
          token: ${{ secrets.PRIVATE_SOURCE_TOKEN }}
          path: ${{ env.PRIVATE_SOURCE_PATH }}
          fetch-depth: 1

      - name: Install Rust toolchain (cross target)
        if: steps.need.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        if: steps.need.outputs.run == 'true'
        with:
          workspaces: ${{ env.PRIVATE_SOURCE_PATH }}/src-tauri -> target
          key: fallback-${{ matrix.target }}

      - name: Install Linux host deps and ARM64 cross linker
        if: steps.need.outputs.run == 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "${GITHUB_ENV}"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "${GITHUB_ENV}"
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> "${GITHUB_ENV}"
          # WebKit pkg-config is host-only; deb packaging still needs host tools.
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "${GITHUB_ENV}"

      - name: Create release build config
        if: steps.need.outputs.run == 'true'
        shell: python
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
          CREATE_UPDATER_ARTIFACTS: ${{ needs.prepare.outputs.updater_signing }}
        run: |
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["PRIVATE_SOURCE_PATH"]) / "src-tauri" / "tauri.release.conf.json"
          path.write_text(
              json.dumps({
                  "version": os.environ["APP_VERSION"],
                  "bundle": {
                      "createUpdaterArtifacts":
                          os.environ["CREATE_UPDATER_ARTIFACTS"] == "true"
                  },
              }, ensure_ascii=False),
              encoding="utf-8",
          )

      - name: Cross-build, sign updater artifacts and upload
        if: steps.need.outputs.run == 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ${{ env.PRIVATE_SOURCE_PATH }}
          args: >-
            --target ${{ matrix.target }}
            --bundles ${{ matrix.bundles }}
            --config src-tauri/tauri.release.conf.json
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: FanqieNovelDownloader-tauri-[platform]-[arch]-fallback-[bundle]
          releaseAssetNamePattern: FanqieNovelDownloader-tauri-[platform]-[arch][setup][ext]
          tagName: ${{ inputs.publish_release && needs.prepare.outputs.tag_name || '' }}
          releaseName: 番茄小说下载器 ${{ needs.prepare.outputs.version }}
          releaseBody: Rust + Tauri v2 全平台正式构建（含稀缺 runner 交叉回退）。
          releaseDraft: true
          prerelease: ${{ inputs.prerelease }}

  android:
    needs: [prepare, verify, release-bootstrap]
    if: needs.prepare.outputs.android_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private Tauri source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.source_ref }}
          token: ${{ secrets.PRIVATE_SOURCE_TOKEN }}
          path: ${{ env.PRIVATE_SOURCE_PATH }}
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            i686-linux-android,
            x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.PRIVATE_SOURCE_PATH }}/src-tauri -> target
          key: android-all-abis

      - name: Install Android SDK, NDK and Tauri CLI
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"
          cargo install tauri-cli --version "${TAURI_CLI_VERSION}" --locked

      - name: Configure Android version
        working-directory: ${{ env.PRIVATE_SOURCE_PATH }}
        shell: bash
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
          VERSION_CODE: ${{ github.run_number }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          Path("src-tauri/tauri.android.release.conf.json").write_text(
              json.dumps({"version": os.environ["APP_VERSION"]}, ensure_ascii=False),
              encoding="utf-8",
          )
          PY
          echo "FANQIE_ANDROID_VERSION_NAME=${APP_VERSION}" >> "${GITHUB_ENV}"
          echo "FANQIE_ANDROID_VERSION_CODE=$((100000 + VERSION_CODE))" >> "${GITHUB_ENV}"

      - name: Ensure Android signing (official secrets or CI-internal keystore)
        id: signing
        working-directory: ${{ env.PRIVATE_SOURCE_PATH }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          FANQIE_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          FANQIE_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          FANQIE_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x scripts/ci-ensure-android-signing.sh
          ./scripts/ci-ensure-android-signing.sh

      - name: Require official signing for published Android release
        if: inputs.publish_release == true && steps.signing.outputs.mode != 'release-secret'
        run: |
          echo "Publishing Android requires ANDROID_KEYSTORE_BASE64 and related secrets."
          exit 1

      - name: Build split APKs, universal APK and AAB
        working-directory: ${{ env.PRIVATE_SOURCE_PATH }}
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
        run: |
          set -euo pipefail
          # Gradle splits.abi in build.gradle.kts produces per-ABI APKs
          # (arm64-v8a, armeabi-v7a, x86_64) + universal APK + AAB in one build.
          echo "::group::Building all Android artifacts"
          cargo tauri android build \
            --target aarch64 armv7 i686 x86_64 \
            --apk \
            --aab \
            --ci \
            --config src-tauri/tauri.android.release.conf.json
          echo "::endgroup::"
          echo "=== Build outputs ==="
          find src-tauri/gen/android/app/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \) -printf '%f  %s bytes\n' | sort

      - name: Collect and verify signed Android artifacts
        working-directory: ${{ env.PRIVATE_SOURCE_PATH }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/android
          while IFS= read -r file; do
            base="$(basename "$file")"
            cp "$file" "dist/android/FanqieNovelDownloader-${FANQIE_ANDROID_VERSION_NAME}-${base}"
          done < <(
            find src-tauri/gen/android/app/build/outputs \
              -type f \( -name '*.apk' -o -name '*.aab' \) -not -name '*-unsigned*' | sort
          )
          echo "=== Collected Android artifacts ==="
          find dist/android -type f -printf '%f  %s bytes\n' | sort
          test -n "$(find dist/android -type f -name '*.apk' -print -quit)"
          APKSIGNER="${ANDROID_HOME}/build-tools/${ANDROID_BUILD_TOOLS}/apksigner"
          while IFS= read -r apk; do
            echo "Verifying signature: ${apk}"
            "${APKSIGNER}" verify --verbose --print-certs "$apk"
          done < <(find dist/android -type f -name '*.apk' | sort)
          {
            echo "signing_mode=${FANQIE_ANDROID_SIGNING_MODE}"
            echo "verified_with=apksigner"
            echo "installable=true"
          } > dist/android/SIGNING.txt
          sha256sum dist/android/* > dist/android/SHA256SUMS-android.txt

      - name: Upload Android workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FanqieNovelDownloader-tauri-android-all-abis
          path: ${{ env.PRIVATE_SOURCE_PATH }}/dist/android/*
          if-no-files-found: error

      - name: Upload Android release assets
        if: inputs.publish_release == true
        working-directory: ${{ env.PRIVATE_SOURCE_PATH }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: gh release upload "${TAG_NAME}" dist/android/* --clobber

  ios:
    needs: [prepare, verify, release-bootstrap]
    if: needs.prepare.outputs.ios_enabled == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout private Tauri source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_SOURCE_REPOSITORY }}
          ref: ${{ needs.prepare.outputs.source_ref }}
          token: ${{ secrets.PRIVATE_SOURCE_TOKEN }}
          path: ${{ env.PRIVATE_SOURCE_PATH }}
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.PRIVATE_SOURCE_PATH }}/src-tauri -> target
          key: ios-arm64

      - name: Install XcodeGen and Tauri CLI
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          cargo install tauri-cli --version "${TAURI_CLI_VERSION}" --locked

      - name: Configure and validate iOS project
        working-directory: ${{ env.PRIVATE_SOURCE_PATH }}
        shell: bash
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          Path("src-tauri/tauri.ios.release.conf.json").write_text(
              json.dumps({"version": os.environ["APP_VERSION"]}, ensure_ascii=False),
              encoding="utf-8",
          )
          PY
          plutil -lint src-tauri/gen/apple/fanqie-novel-downloader-tauri_iOS/Info.plist
          /usr/libexec/PlistBuddy \
            -c "Print :UIFileSharingEnabled" \
            src-tauri/gen/apple/fanqie-novel-downloader-tauri_iOS/Info.plist
          grep -q "fanqie_present_file_share_sheet" \
            src-tauri/gen/apple/Sources/fanqie-novel-downloader-tauri/main.mm

      - name: Build unsigned iOS IPA
        if: needs.prepare.outputs.ios_signing != 'true'
        working-directory: ${{ env.PRIVATE_SOURCE_PATH }}
        run: >-
          cargo tauri ios build
          --target aarch64
          --ci
          --no-sign
          --config src-tauri/tauri.ios.release.conf.json

      - name: Build signed App Store IPA
        if: needs.prepare.outputs.ios_signing == 'true'
        working-directory: ${{ env.PRIVATE_SOURCE_PATH }}
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: >-
          cargo tauri ios build
          --target aarch64
          --ci
          --export-method app-store-connect
          --config src-tauri/tauri.ios.release.conf.json

      - name: Collect iOS IPA
        working-directory: ${{ env.PRIVATE_SOURCE_PATH }}
        shell: bash
        run: |
          mkdir -p dist/ios
          while IFS= read -r file; do
            cp "$file" "dist/ios/FanqieNovelDownloader-${{ needs.prepare.outputs.version }}-$(basename "$file")"
          done < <(find src-tauri/gen/apple -type f -name '*.ipa' | sort)
          test -n "$(find dist/ios -type f -name '*.ipa' -print -quit)"
          shasum -a 256 dist/ios/*.ipa > dist/ios/SHA256SUMS-ios.txt

      - name: Upload iOS workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FanqieNovelDownloader-tauri-ios-arm64
          path: ${{ env.PRIVATE_SOURCE_PATH }}/dist/ios/*
          if-no-files-found: error

      - name: Upload iOS release assets
        if: inputs.publish_release == true
        working-directory: ${{ env.PRIVATE_SOURCE_PATH }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: gh release upload "${TAG_NAME}" dist/ios/* --clobber

  finalize:
    needs: [prepare, verify, release-bootstrap, desktop, desktop-fallback, android, ios]
    if: >-
      always() &&
      inputs.publish_release == true &&
      needs.prepare.result == 'success' &&
      needs.verify.result == 'success' &&
      needs.release-bootstrap.result == 'success' &&
      (needs.desktop.result == 'success' || needs.desktop.result == 'skipped') &&
      (needs.desktop-fallback.result == 'success' || needs.desktop-fallback.result == 'skipped') &&
      (needs.android.result == 'success' || needs.android.result == 'skipped') &&
      (needs.ios.result == 'success' || needs.ios.result == 'skipped' || needs.ios.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Verify release metadata, rewrite Chinese notes, publish draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SOURCE_REF: ${{ needs.prepare.outputs.source_ref }}
          SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
          PLATFORMS: ${{ needs.prepare.outputs.selected_platforms }}
          DESKTOP_COUNT: ${{ needs.prepare.outputs.desktop_count }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          mkdir -p release-check
          gh release download "${TAG_NAME}" --dir release-check
          find release-check -maxdepth 1 -type f -printf '%f\n' | sort

          if [[ "${DESKTOP_COUNT}" != "0" ]]; then
            test -s release-check/latest.json
            python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("release-check/latest.json").read_text(encoding="utf-8"))
          platforms = payload.get("platforms") or {}
          if not platforms:
              raise SystemExit("latest.json does not contain updater platforms")
          for name, item in platforms.items():
              if not item.get("url") or not item.get("signature"):
                  raise SystemExit(f"invalid updater entry: {name}")
          print("Updater platforms:", ", ".join(sorted(platforms)))
          PY
          fi

          (
            cd release-check
            find . -maxdepth 1 -type f \
              ! -name 'SHA256SUMS-release.txt' \
              -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS-release.txt
          )
          gh release upload "${TAG_NAME}" \
            release-check/SHA256SUMS-release.txt \
            --clobber

          # Clash Verge style Chinese release notes with real download links.
          python - <<'PY'
          import os
          from pathlib import Path

          tag = os.environ["TAG_NAME"]
          version = os.environ["VERSION"]
          repo = os.environ["GH_REPO"]
          base = f"https://github.com/{repo}/releases/download/{tag}"
          assets = sorted(
              p.name
              for p in Path("release-check").iterdir()
              if p.is_file()
              and not p.name.endswith(".sig")
              and p.name not in {"latest.json", "SHA256SUMS-release.txt", "SHA256SUMS-android.txt", "SHA256SUMS-ios.txt", "SIGNING.txt"}
          )

          def pick(*needles: str) -> list[str]:
              out = []
              for name in assets:
                  low = name.lower()
                  if all(n.lower() in low for n in needles):
                      out.append(name)
              return out

          def link(name: str, label: str) -> str:
              return f"[{label}]({base}/{name})"

          def links(items: list[str], labels: dict[str, str] | None = None) -> str:
              if not items:
                  return "_本版本未提供_"
              parts = []
              for name in items:
                  label = name
                  if labels:
                      for key, value in labels.items():
                          if key in name.lower():
                              label = value
                              break
                  parts.append(link(name, label))
              return " | ".join(parts)

          win_x64 = pick("windows-x64", ".exe")
          win_arm = pick("windows-arm64", ".exe")
          mac_arm = [n for n in pick("darwin-aarch64") if n.endswith(".dmg")]
          mac_x64 = [n for n in pick("darwin-x64") if n.endswith(".dmg")]
          linux_deb_x64 = pick("linux-amd64", ".deb")
          linux_deb_arm = pick("linux-arm64", ".deb")
          linux_app_x64 = pick("linux-amd64", ".appimage")
          linux_app_arm = pick("linux-arm64", ".appimage")
          android_arm64 = [n for n in assets if "arm64-v8a" in n.lower() and n.endswith(".apk")]
          android_v7 = [n for n in assets if "armeabi-v7a" in n.lower() and n.endswith(".apk")]
          android_x86 = [n for n in assets if "x86_64" in n.lower() and n.endswith(".apk")]
          android_uni = [n for n in assets if "universal" in n.lower() and n.endswith(".apk")]
          android_aab = [n for n in assets if n.endswith(".aab")]
          ios_ipa = [n for n in assets if n.endswith(".ipa")]

          pre = os.environ.get("PRERELEASE", "false").lower() == "true"
          badge = "（测试预发布，不会触发稳定版自动更新）" if pre else ""

          lines = [
              f"## {version}{badge}",
              "",
              "基于 **Rust + Tauri v2** 的番茄小说下载器。",
              "",
              "> 🔄 已安装旧版的用户，可直接在软件内使用「一键更新」。",
              ">",
              "> 📱 **当前支持**：Windows / Linux / macOS / Android；iOS 提供无签名 IPA（需自行侧载）。",
              "",
              "## 下载地址",
              "",
              "### 🪟 Windows",
              "",
              "#### 安装包（推荐）",
              "",
              f"- {links(win_x64, {'x64': '64位（常用）', 'arm64': 'ARM64（不常用）'})}",
          ]
          if win_arm:
              # If win_x64 line didn't include arm (different files), add arm line
              if not any("arm64" in x.lower() for x in win_x64):
                  lines.append(f"- {links(win_arm, {'arm64': 'ARM64（Surface / 骁龙本）'})}")
          lines += [
              "",
              "### 🍎 macOS",
              "",
              f"- {links(mac_arm, {'aarch64': 'Apple M 芯片（推荐）', 'arm64': 'Apple M 芯片（推荐）'})}",
              f"- {links(mac_x64, {'x64': 'Intel 芯片'})}",
              "",
              "### 🐧 Linux",
              "",
              "#### DEB 包（推荐，体积小，Debian / Ubuntu 等）",
              "",
              f"- {links(linux_deb_x64, {'amd64': '64位', 'arm64': 'ARM64'})}",
          ]
          if linux_deb_arm and not any("arm64" in x.lower() for x in linux_deb_x64):
              lines.append(f"- {links(linux_deb_arm, {'arm64': 'ARM64'})}")
          lines += [
              "",
              "#### AppImage（免安装，体积较大约 80MB）",
              "",
              f"- {links(linux_app_x64, {'amd64': '64位', 'arm64': 'ARM64'})}",
          ]
          if linux_app_arm and not any("arm64" in x.lower() for x in linux_app_x64):
              lines.append(f"- {links(linux_app_arm, {'arm64': 'ARM64'})}")
          lines += [
              "",
              "### 🤖 Android",
              "",
              "#### 手机安装包",
              "",
          ]
          any_apk = android_arm64 or android_v7 or android_uni or android_x86
          if android_arm64:
              lines.append(f"- {links(android_arm64, {'arm64-v8a': '64位 arm64-v8a（现代手机，推荐）'})}")
          if android_v7:
              lines.append(f"- {links(android_v7, {'armeabi-v7a': '32位 armeabi-v7a（老旧手机）'})}")
          if android_uni:
              uni_label = '通用版 universal（兼容所有设备）'
              # 如果只有 universal，标注体积约 66MB
              if not android_arm64 and not android_v7 and not android_x86:
                  uni_label = '通用版 universal（兼容所有设备，约 66MB）'
              lines.append(f"- {links(android_uni, {'universal': uni_label})}")
          if android_x86:
              lines.append(f"- {links(android_x86, {'x86_64': 'x86_64（模拟器 / 部分平板）'})}")
          if not any_apk:
              lines.append("- _本版本未提供_")
          lines += [
              "",
              "#### 应用商店包",
              "",
          ]
          if android_aab:
              lines.append(f"- {links(android_aab, {'aab': 'AAB（上架用）'})}")
          else:
              lines.append("- _本版本未提供_")
          lines += [
              "",
              "### 📱 iOS",
              "",
          ]
          if ios_ipa:
              lines.append(f"- {links(ios_ipa, {'ipa': '无签名 IPA（需自行侧载）'})}")
              lines += [
                  "",
                  "> ⚠️ **未上架 App Store**。此 IPA **无 Apple 签名**，需自行用 AltStore / Sideloadly / TrollStore 等工具侧载安装。",
                  "> 安装后需信任开发者证书（设置 → 通用 → VPN 与设备管理）。",
              ]
          else:
              lines.append("_本版本未提供 IPA。_")

          lines += [
              "",
              "---",
              "",
              "### ❓ 常见问题",
              "",
              "- **Windows 提示无法验证发行商**：安装包右键 → 属性 → 勾选「解除锁定」后再运行。",
              "- **Linux DEB 打不开**：先安装 `libwebkit2gtk-4.1`（Ubuntu/Debian）。",
              "- **Android 安装被拦截**：系统设置中允许「安装未知来源应用」。",
              "- **iOS 如何安装**：下载无签名 IPA，用 AltStore / Sideloadly / TrollStore 等工具侧载；不支持 App Store。",
              "- **软件内更新失败**：可手动下载本页对应平台安装包覆盖安装。",
              "",
              "### 💎 支持与推广",
              "",
              "如果这个项目对你有帮助，也欢迎支持一下合作服务：",
              "",
              "> 走邀请码注册即送 **1 美元**，不走邀请链接是没有的。麻烦各位体验一下了。",
              "",
              f"- [注册链接（含邀请码）](https://999554.xyz/register?aff=Xf2p)",
              "",
              "也诚招赞助与推广合作，可通过 [Issues](https://github.com/POf-L/Fanqie-novel-Downloader/issues) 留言联系。",
              "",
              "### 🔗 相关链接",
              "",
              "- [问题反馈](https://github.com/POf-L/Fanqie-novel-Downloader/issues)",
              "- [项目说明](https://github.com/POf-L/Fanqie-novel-Downloader)",
              "",
              "<details>",
              "<summary>📦 构建信息</summary>",
              "",
              f"- 版本：`{version}`",
              f"- Tag：`{tag}`",
              f"- 源码引用：`{os.environ.get('SOURCE_REF', '')}`",
              f"- 源码提交：`{os.environ.get('SOURCE_COMMIT', '')}`",
              f"- 构建平台：{os.environ.get('PLATFORMS', '')}",
              f"- 资源数量：{len(assets)}",
              "",
              "</details>",
              "",
          ]

          Path("release-notes-final.md").write_text("\n".join(lines), encoding="utf-8")
          print("Generated release notes with", len(assets), "assets")
          PY

          gh release edit "${TAG_NAME}" \
            --notes-file release-notes-final.md \
            --draft=false

      - name: Release summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Tauri Release

          - Version: \`${{ needs.prepare.outputs.version }}\`
          - Tag: \`${{ needs.prepare.outputs.tag_name }}\`
          - Private source: \`${{ env.PRIVATE_SOURCE_REPOSITORY }}@${{ needs.prepare.outputs.source_commit }}\`
          - Platforms: ${{ needs.prepare.outputs.selected_platforms }}
          - Prerelease: \`${{ inputs.prerelease }}\`
          - Updater metadata: \`${{ needs.prepare.outputs.desktop_count != '0' }}\`
          - Desktop fallback jobs: \`${{ needs.prepare.outputs.desktop_fallback_count }}\`
          - Desktop native result: \`${{ needs.desktop.result }}\`
          - Desktop fallback result: \`${{ needs.desktop-fallback.result }}\`
          EOF
